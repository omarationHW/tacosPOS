<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/Logo - La Andaluza_V.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="La Andaluza" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <title>La Andaluza POS</title>

    <!-- Avoid theme flash: apply .dark class before React mounts -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('la-andaluza:theme-mode');
          var mode = stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'system';
          var resolved =
            mode === 'system'
              ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
              : mode;
          if (resolved === 'dark') document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = resolved;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
